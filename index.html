<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具集</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 10px;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        
        .tool-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            text-decoration: none;
            color: #333;
            display: block;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .tool-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border-color: #667eea;
            background: white;
        }
        
        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .tool-number {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .tool-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .tool-desc {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .tool-file {
            font-size: 0.9rem;
            color: #888;
            background: #eee;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            font-family: monospace;
        }
        
        .tool-click {
            color: #667eea;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            border-top: 1px solid #eee;
        }
        
        .back-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #667eea;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        
        .back-btn:hover {
            background: #764ba2;
            color: white;
        }
        
        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
        
        /* 每個工具卡片的獨特顏色 */
        .tool-card:nth-child(1)::before { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .tool-card:nth-child(2)::before { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .tool-card:nth-child(3)::before { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .tool-card:nth-child(4)::before { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .tool-card:nth-child(5)::before { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .tool-card:nth-child(6)::before { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
        .tool-card:nth-child(7)::before { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .tool-card:nth-child(8)::before { background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%); }
        .tool-card:nth-child(9)::before { background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); }
        .tool-card:nth-child(10)::before { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .tool-card:nth-child(11)::before { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .tool-card:nth-child(12)::before { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
		   
        .tool-card:nth-child(1) .tool-number { background: #667eea; }
        .tool-card:nth-child(2) .tool-number { background: #f5576c; }
        .tool-card:nth-child(3) .tool-number { background: #4facfe; }
        .tool-card:nth-child(4) .tool-number { background: #43e97b; }
        .tool-card:nth-child(5) .tool-number { background: #fa709a; }
        .tool-card:nth-child(6) .tool-number { background: #30cfd0; }
        .tool-card:nth-child(7) .tool-number { background: #a8edea; color: #333; }
        .tool-card:nth-child(8) .tool-number { background: #d299c2; }
        .tool-card:nth-child(9) .tool-number { background: #66a6ff; }
        .tool-card:nth-child(10) .tool-number { background: #f5576c; }
        .tool-card:nth-child(11) .tool-number { background: #4facfe; }
        .tool-card:nth-child(12) .tool-number { background: #fa709a; }		
		
		
    </style>
	
		    <!-- ========== 防護區塊：禁止右鍵 + 禁止 F12 開發者工具 ========== -->
    <script>
        (function() {
            // 1. 禁止右鍵選單 (contextmenu)
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // 2. 防堵開發者工具快捷鍵
            function blockDevTools(e) {
                // F12 鍵
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+I (Windows/Linux) 或 Cmd+Option+I (Mac)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+J (Windows/Linux) 或 Cmd+Option+J (Mac)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+U (檢視原始碼)
                if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+S (儲存頁面)
                if ((e.ctrlKey || e.metaKey) && (e.key === 'S' || e.key === 's')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+C (開啟選取元素)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                    e.preventDefault();
                    return false;
                }
                return true;
            }
            
            document.addEventListener('keydown', blockDevTools);
            
            // 3. 偵測開發者工具是否開啟 (透過console被呼叫)
            let devtoolsOpen = false;
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    devtoolsOpen = true;
                    console.warn('偵測到開發者工具');
                    return '';
                }
            });
            setInterval(function() {
                devtoolsOpen = false;
                console.log(element);
                console.clear();
                if (devtoolsOpen) {
                    console.clear();
                    // 可選：顯示警告或重新導向
                    // alert('請關閉開發者工具後繼續使用');
                }
            }, 1000);
        })();
    </script>
    <!-- ========== 防護區塊結束 ========== -->

    <!-- 返回按鈕（在工具頁面顯示） -->
    <a href="index.html" class="back-btn" id="backBtn">←</a>
    
    <script>
        // 只在非首頁顯示返回按鈕
        if (window.location.pathname !== '/' && !window.location.pathname.endsWith('index.html')) {
            document.getElementById('backBtn').style.display = 'flex';
        }
        
        // 自動修改描述和標題（您可以手動修改）
        const toolNames = [
            "設備詢價",
            "火焰探測器監視範圍討論", 
            "光電分離型",
            "美規總機編號工具",
            "Latitude 資料輸出工具",
            "UL氣體滅火盤手冊",
            "設計部門計算點數",
            "設計部門摩擦損失",
            "設備採購工具",
			"CAD點位名稱合併",
			"區域名稱合併",
			"其他"
        ];
        
        const toolDescriptions = [
            "進入詢價作業工具",
            "CAD作圖時使用曲線由來",
            "校正、配線時注意事項",
            "模組編號工具",
            "latitude 數據格式轉換工具",
            "HCVR-3 配線、設定",
            "日規總機採用中繼器計算",
            "管道摩擦損失計算工具",
            "可以此工具製作詢價、訂購",
			"將各別探測器對應名稱合併",
			"自動生成編碼與區域名稱合併",
			"其他"			
        ];
        
        // 自動更新工具名稱和描述
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.tool-card');
            cards.forEach((card, index) => {
                if (toolNames[index]) {
                    card.querySelector('.tool-title').textContent = toolNames[index];
                }
                if (toolDescriptions[index]) {
                    card.querySelector('.tool-desc').textContent = toolDescriptions[index];
                }
                
                // 更新檔案名稱顯示
                const filename = card.getAttribute('href');
                card.querySelector('.tool-file').textContent = `檔案：${filename}`;
            });
        });
    </script>
