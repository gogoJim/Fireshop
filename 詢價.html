	    <!-- ========== 防護區塊：禁止右鍵 + 禁止 F12 開發者工具 ========== -->
    <script>
        (function() {
            // 1. 禁止右鍵選單 (contextmenu)
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // 2. 防堵開發者工具快捷鍵
            function blockDevTools(e) {
                // F12 鍵
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+I (Windows/Linux) 或 Cmd+Option+I (Mac)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+J (Windows/Linux) 或 Cmd+Option+J (Mac)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+U (檢視原始碼)
                if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+S (儲存頁面)
                if ((e.ctrlKey || e.metaKey) && (e.key === 'S' || e.key === 's')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+C (開啟選取元素)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                    e.preventDefault();
                    return false;
                }
                return true;
            }
            
            document.addEventListener('keydown', blockDevTools);
            
            // 3. 偵測開發者工具是否開啟 (透過console被呼叫)
            let devtoolsOpen = false;
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    devtoolsOpen = true;
                    console.warn('偵測到開發者工具');
                    return '';
                }
            });
            setInterval(function() {
                devtoolsOpen = false;
                console.log(element);
                console.clear();
                if (devtoolsOpen) {
                    console.clear();
                    // 可選：顯示警告或重新導向
                    // alert('請關閉開發者工具後繼續使用');
                }
            }, 1000);
        })();
    </script>
    <!-- ========== 防護區塊結束 ========== -->

    function showToast(msg, duration=1200) { let toast = document.getElementById('toastMsg'); toast.textContent = msg; toast.style.opacity='1'; toast.style.visibility='visible'; setTimeout(()=>{ toast.style.opacity='0'; toast.style.visibility='hidden'; }, duration); }
    function openCatalogInNewTab(itemId, itemName) { window.open(`PDF/${itemId}.pdf`, '_blank'); showToast(`開啟型錄: ${itemName}`, 1000); }
    function openApprovalInNewTab(itemId, itemName) { window.open(`PDF2/${itemId}.pdf`, '_blank'); showToast(`開啟認可文件: ${itemName}`, 1000); }
    function openManual(itemId, itemName) { window.open(`PDF_Manual/${itemId}.pdf`, '_blank'); showToast(`開啟說明書: ${itemName}`, 1000); }
    function openSticker(itemId, itemName) { window.open(`sticker/${itemId}.html`, '_blank'); showToast(`開啟貼紙樣張: ${itemName}`, 1000); }
    function openOriginalCert(itemId, itemName) { window.open(`PDF_Cert/${itemId}.pdf`, '_blank'); showToast(`開啟原廠認可: ${itemName}`, 1000); }
    function generateFileName(projectName, extension) { const now=new Date(); const ds=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`; const safe=projectName.replace(/[\\/:*?"<>|]/g,'_'); return `${safe}_${ds}.${extension}`; }

    function updateAllUI() { 
        let totalQty=0; 
        for(let v of inquiryCart.values()) totalQty+=v.quantity; 
        document.getElementById('sidebarTotalQty').innerText=totalQty; 
        document.getElementById('sidebarUniqueCount').innerText=inquiryCart.size; 
        document.getElementById('drawerTotalQtySpan').innerText=totalQty; 
        renderDrawerCart(); 
        if(currentSearchKeyword && currentSearchKeyword.trim() !== '') {
            renderGlobalSearchResults(currentSearchKeyword);
        } else if(currentCategory === 'I') {
            renderCustomCategoryView();
        } else {
            renderProductsByCategory(currentCategory, '');
        }
    }
    
    function setQuantity(itemKey, newQty, itemDetail) { 
        let qty=parseInt(newQty,10); 
        if(isNaN(qty)||qty<0) qty=0; 
        if(qty<=0) inquiryCart.delete(itemKey); 
        else inquiryCart.set(itemKey, { ...itemDetail, quantity: qty }); 
        updateAllUI(); 
    }

    // 顯示浮動文件選單（只顯示可用的文件）
    function showDocsDropdown(btn, itemId, itemName, category) {
        const status = getFileStatus(itemId);
        // 只加入可用的文件選項
        const menuItems = [];
        if (status.catalog) menuItems.push({ label: '型錄', icon: '📄', action: () => openCatalogInNewTab(itemId, itemName) });
        if (status.approval) menuItems.push({ label: '認可文件', icon: '✅', action: () => openApprovalInNewTab(itemId, itemName) });
        if (status.manual) menuItems.push({ label: '說明書', icon: '📘', action: () => openManual(itemId, itemName) });
        if (status.sticker) menuItems.push({ label: '貼紙樣張', icon: '🏷️', action: () => openSticker(itemId, itemName) });
        if (status.cert) menuItems.push({ label: '原廠認可', icon: '🏭', action: () => openOriginalCert(itemId, itemName) });
        
        // 如果沒有任何可用文件，顯示提示
        if (menuItems.length === 0) {
            showToast(`${itemName} 暫無任何文件`, 1000);
            return;
        }
        
        // 移除已存在的選單
        const existingMenu = document.querySelector('.docs-dropdown');
        if(existingMenu) existingMenu.remove();
        
        const rect = btn.getBoundingClientRect();
        const menuDiv = document.createElement('div');
        menuDiv.className = 'docs-dropdown';
        menuDiv.style.top = `${rect.bottom + window.scrollY + 5}px`;
        menuDiv.style.left = `${rect.left + window.scrollX}px`;
        
        const ul = document.createElement('ul');
        menuItems.forEach(item => {
            const li = document.createElement('li');
            const optionBtn = document.createElement('button');
            optionBtn.innerHTML = `<span class="doc-icon">${item.icon}</span> ${item.label}`;
            optionBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                item.action();
                menuDiv.remove();
            });
            li.appendChild(optionBtn);
            ul.appendChild(li);
        });
        menuDiv.appendChild(ul);
        document.body.appendChild(menuDiv);
        
        // 點擊外部關閉
        const closeHandler = (e) => {
            if (!menuDiv.contains(e.target) && e.target !== btn) {
                menuDiv.remove();
                document.removeEventListener('click', closeHandler);
                document.removeEventListener('keydown', escHandler);
            }
        };
        const escHandler = (e) => { 
            if(e.key === 'Escape') { 
                menuDiv.remove(); 
                document.removeEventListener('click', closeHandler); 
                document.removeEventListener('keydown', escHandler); 
            } 
        };
        setTimeout(() => { 
            document.addEventListener('click', closeHandler); 
            document.addEventListener('keydown', escHandler); 
        }, 10);
    }

    // 渲染分類檢視
    function renderProductsByCategory(category, keyword = '') {
        if(category === 'I') { renderCustomCategoryView(); return; }
        const catData = equipmentDB[category];
        if(!catData) return;
        let filteredGroups = [];
        if(keyword && keyword.trim() !== '') {
            const kw = keyword.trim().toLowerCase();
            catData.mainGroups.forEach(group => {
                const matchedSubs = group.subItems.filter(sub => {
                    const id = (sub.id || '').toLowerCase();
                    const name = (sub.name || '').toLowerCase();
                    const desc = (sub.desc || '').toLowerCase();
                    return id.includes(kw) || name.includes(kw) || desc.includes(kw);
                });
                if(matchedSubs.length) {
                    filteredGroups.push({ ...group, subItems: matchedSubs });
                }
            });
        } else {
            filteredGroups = catData.mainGroups;
        }
        
        if(filteredGroups.length === 0) {
            document.getElementById('productsList').innerHTML = `<div class="no-result-msg">🔍 沒有符合「${escapeHtml(keyword)}」的產品，請嘗試其他關鍵字。</div>`;
            return;
        }
        
        let html = '';
        filteredGroups.forEach(group => {
            html += `<div class="product-main-card"><div class="main-category-title"><span>${group.icon||'📦'}</span> ${escapeHtml(group.mainName)}</div><div class="sub-items-list">`;
            group.subItems.forEach(sub => {
                const currentQty = inquiryCart.has(sub.id) ? inquiryCart.get(sub.id).quantity : 0;
                const highlightClass = currentQty > 0 ? 'selected-highlight' : '';
                html += `<div class="sub-item-row ${highlightClass}" data-item-id="${sub.id}">
                            <div class="sub-item-info">
                                <div class="sub-item-name"><span class="item-code">${escapeHtml(sub.id)}</span>${escapeHtml(sub.name)}</div>
                                <div class="sub-item-desc">${escapeHtml(sub.desc)}</div>
                            </div>
                            <div class="action-buttons">
                                <button class="docs-main-btn" data-id="${sub.id}" data-name="${sub.name}" data-category="${category}">📁 相關文件</button>
                                <div class="qty-control">
                                    <button class="qty-dec" data-id="${sub.id}" data-cat="${category}">−</button>
                                    <input type="number" class="qty-number-input" id="qty-input-${sub.id}" value="${currentQty}" min="0" step="1">
                                    <button class="qty-inc" data-id="${sub.id}" data-cat="${category}">+</button>
                                </div>
                            </div>
                        </div>`;
            });
            html += `</div></div>`;
        });
        document.getElementById('productsList').innerHTML = html;
        attachProductEvents(category);
    }
    
    function attachProductEvents(category) {
        // 綁定主要文件按鈕
        document.querySelectorAll('.docs-main-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                const cat = btn.getAttribute('data-category');
                showDocsDropdown(btn, id, name, cat);
            });
        });

        const qtyInc = document.querySelectorAll('.qty-inc');
        const qtyDec = document.querySelectorAll('.qty-dec');
        const qtyInputs = document.querySelectorAll('.qty-number-input');

        const findSub = (id, cat) => { 
            const groups = equipmentDB[cat]?.mainGroups; 
            if(groups) {
                for(let g of groups) { 
                    let s = g.subItems.find(s=>s.id===id); 
                    if(s) return s; 
                }
            } 
            return null; 
        };
       
        qtyInc.forEach(btn => btn.addEventListener('click',()=>{ 
            const id=btn.getAttribute('data-id'), cat=btn.getAttribute('data-cat'); 
            const sub=findSub(id,cat); 
            if(sub){ 
                const input=document.getElementById(`qty-input-${id}`); 
                let newVal=(parseInt(input.value,10)||0)+1; 
                if(newVal<0)newVal=0; 
                input.value=newVal; 
                setQuantity(sub.id, newVal, { id:sub.id, name:sub.name, category:cat, code:sub.id, desc:sub.desc }); 
            } 
        }));
        
        qtyDec.forEach(btn => btn.addEventListener('click',()=>{ 
            const id=btn.getAttribute('data-id'), cat=btn.getAttribute('data-cat'); 
            const sub=findSub(id,cat); 
            if(sub){ 
                const input=document.getElementById(`qty-input-${id}`); 
                let newVal=(parseInt(input.value,10)||0)-1; 
                if(newVal<0)newVal=0; 
                input.value=newVal; 
                setQuantity(sub.id, newVal, { id:sub.id, name:sub.name, category:cat, code:sub.id, desc:sub.desc }); 
            } 
        }));
        
        qtyInputs.forEach(input=>{ 
            input.addEventListener('change',function(){ 
                const id=this.id.replace('qty-input-',''); 
                let raw=parseInt(this.value,10); 
                if(isNaN(raw)||raw<0) raw=0; 
                this.value=raw; 
                for(let cat of ['A','B','C','D','E','F','G','H']){ 
                    const sub=findSub(id,cat); 
                    if(sub){ 
                        setQuantity(sub.id, raw, { id:sub.id, name:sub.name, category:cat, code:sub.id, desc:sub.desc }); 
                        break; 
                    } 
                } 
            }); 
        });
    }	

    // 自訂項目
    function renderCustomCategoryView() { 
        let html=`<div class="custom-request-area"><div class="custom-header"><h4>✏️ 其他設備 / 自訂需求</h4><button class="add-custom-btn" id="addCustomBtn">+ 新增詢問項目</button></div>`; 
        if(customRequests.length===0) html+=`<div class="empty-custom-msg">請點擊按鈕新增</div>`; 
        else customRequests.forEach((req,idx)=>{ 
            const qty=inquiryCart.has(`custom_${req.id}`)?inquiryCart.get(`custom_${req.id}`).quantity:req.quantity; 
            html+=`<div class="custom-item-card" data-custom-id="${req.id}"><div class="custom-field"><label>設備名稱/型號</label><input type="text" class="custom-name" value="${escapeHtml(req.name)}"></div><div class="custom-field"><label>規格/備註</label><textarea class="custom-desc">${escapeHtml(req.description)}</textarea></div><div class="custom-field"><label>數量</label><input type="number" class="custom-qty" value="${qty}" min="0"></div><div><button class="del-custom-btn" data-id="${req.id}">🗑️ 刪除</button></div></div>`; 
        }); 
        html+=`</div>`; 
        document.getElementById('productsList').innerHTML=html; 
        document.getElementById('addCustomBtn')?.addEventListener('click',addNewCustomItem); 
        document.querySelectorAll('.del-custom-btn').forEach(btn=>btn.addEventListener('click',(e)=>{ const id=parseInt(btn.getAttribute('data-id')); deleteCustomItem(id); })); 
        document.querySelectorAll('.custom-item-card').forEach(card=>{ 
            const cid=parseInt(card.getAttribute('data-custom-id')); 
            const nameInp=card.querySelector('.custom-name'), descInp=card.querySelector('.custom-desc'), qtyInp=card.querySelector('.custom-qty'); 
            const update=()=>{ 
                const newName=nameInp.value.trim()||"未命名"; 
                const newDesc=descInp.value; 
                let newQty=parseInt(qtyInp.value,10); 
                if(isNaN(newQty)||newQty<0)newQty=0; 
                const idx=customRequests.findIndex(r=>r.id===cid); 
                if(idx!==-1){ 
                    customRequests[idx].name=newName; 
                    customRequests[idx].description=newDesc; 
                    customRequests[idx].quantity=newQty; 
                    const mapKey=`custom_${cid}`; 
                    if(newQty<=0) inquiryCart.delete(mapKey); 
                    else inquiryCart.set(mapKey, { id:mapKey, name:`[自訂] ${newName}`, category:"I", code:`CUS-${cid}`, quantity:newQty, desc:newDesc }); 
                    updateAllUI(); 
                } 
            }; 
            nameInp.addEventListener('change',update); 
            descInp.addEventListener('change',update); 
            qtyInp.addEventListener('change',update); 
        }); 
    }
    function addNewCustomItem() { const newId=nextCustomId++; customRequests.push({ id:newId, name:"新設備需求", description:"請填寫規格", quantity:0 }); renderCustomCategoryView(); showToast("新增自訂項目",800); }
    function deleteCustomItem(id) { const idx=customRequests.findIndex(r=>r.id===id); if(idx!==-1){ customRequests.splice(idx,1); inquiryCart.delete(`custom_${id}`); updateAllUI(); renderCustomCategoryView(); } }
    
    // 購物車繪製
    function renderDrawerCart() { 
        const container=document.getElementById('drawerCartList'); 
        if(inquiryCart.size===0){ container.innerHTML='<div class="empty-cart-msg">📭 暫無設備</div>'; return; } 
        let html=''; 
        for(let [key,item] of inquiryCart.entries()){ 
            html+=`<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${escapeHtml(item.name)} ${item.code?`[${item.code}]`:''}</div><div style="font-size:0.7rem;">${item.category?item.category+'類':'自訂'}</div></div><div><div class="cart-item-controls"><button class="cart-dec" data-key="${key}">−</button><span>${item.quantity}</span><button class="cart-inc" data-key="${key}">+</button></div><button class="remove-item-btn" data-key="${key}">🗑️</button></div></div>`; 
        } 
        container.innerHTML=html; 
        document.querySelectorAll('.cart-dec').forEach(btn=>btn.addEventListener('click',()=>changeCartQty(btn.getAttribute('data-key'),-1))); 
        document.querySelectorAll('.cart-inc').forEach(btn=>btn.addEventListener('click',()=>changeCartQty(btn.getAttribute('data-key'),1))); 
        document.querySelectorAll('.remove-item-btn').forEach(btn=>btn.addEventListener('click',()=>{ inquiryCart.delete(btn.getAttribute('data-key')); updateAllUI(); })); 
    }
    function changeCartQty(key, delta) { if(!inquiryCart.has(key)) return; let item=inquiryCart.get(key); let newQty=item.quantity+delta; if(newQty<=0) inquiryCart.delete(key); else { item.quantity=newQty; inquiryCart.set(key,item); } updateAllUI(); }

    function buildSidebarNav() { 
        const navContainer=document.getElementById('navCategories'); 
        const categories=['A','B','C','D','E','I']; 
        let btnsHtml=''; 
        categories.forEach(cat=>{ 
            const displayName=cat==='I'?'其他設備需求':(equipmentDB[cat]?equipmentDB[cat].name:cat);

    // 全域搜尋
    function performSearch() {
        const keyword = document.getElementById('searchKeyword').value;
        currentSearchKeyword = keyword;
        if(!keyword.trim()) {
            if(currentCategory === 'I') {
                renderCustomCategoryView();
            } else {
                renderProductsByCategory(currentCategory, '');
            }
            return;
        }
        renderGlobalSearchResults(keyword);
    }

    function renderGlobalSearchResults(keyword) {
        const kw = keyword.trim().toLowerCase();
        const allResults = [];
        for(let cat of ['A','B','C','D','E','F','G','H']) {
            const catData = equipmentDB[cat];
            if(catData && catData.mainGroups) {
                catData.mainGroups.forEach(group => {
                    group.subItems.forEach(sub => {
                        const id = (sub.id || '').toLowerCase();
                        const name = (sub.name || '').toLowerCase();
                        const desc = (sub.desc || '').toLowerCase();
                        if(id.includes(kw) || name.includes(kw) || desc.includes(kw)) {
                            allResults.push({
                                ...sub,
                                categoryCode: cat,
                                categoryName: catData.name,
                                groupName: group.mainName,
                                groupIcon: group.icon
                            });
                        }
                    });
                });
            }
        }
        
        if(allResults.length === 0) {
            document.getElementById('productsList').innerHTML = `<div class="no-result-msg">🔍 沒有符合「${escapeHtml(keyword)}」的產品，請嘗試其他關鍵字。</div>`;
            return;
        }
        
        const groupedByCategory = {};
        allResults.forEach(item => {
            if(!groupedByCategory[item.categoryCode]) {
                groupedByCategory[item.categoryCode] = {
                    categoryName: item.categoryName,
                    items: []
                };
            }
            groupedByCategory[item.categoryCode].items.push(item);
        });
        
        let html = `<div style="margin-bottom: 16px; padding: 12px 20px; background: #e8f0fe; border-radius: 28px;">
                        🔍 搜尋「${escapeHtml(keyword)}」共找到 ${allResults.length} 項產品
                    </div>`;
        
        const categoryOrder = ['A','B','C','D','E','F','G','H'];
        for(let cat of categoryOrder) {
            if(groupedByCategory[cat]) {
                const group = groupedByCategory[cat];
                html += `<div class="product-main-card" style="margin-bottom: 24px;">
                            <div class="main-category-title" style="background: #2c6e9e; color: white;">
                                <span>${getCategoryIcon(cat)}</span> ${cat}類 · ${group.categoryName}
                            </div>
                            <div class="sub-items-list">`;
                
                group.items.forEach(sub => {
                    const currentQty = inquiryCart.has(sub.id) ? inquiryCart.get(sub.id).quantity : 0;
                    const highlightClass = currentQty > 0 ? 'selected-highlight' : '';
                    html += `<div class="sub-item-row ${highlightClass}" data-item-id="${sub.id}">
                                <div class="sub-item-info">
                                    <div class="sub-item-name">
                                        <span class="item-code">${escapeHtml(sub.id)}</span>
                                        ${escapeHtml(sub.name)}
                                        <span style="font-size: 0.7rem; background: #e9ecef; padding: 2px 8px; border-radius: 20px;">${cat}類</span>
                                    </div>
                                    <div class="sub-item-desc">${escapeHtml(sub.desc)}</div>
                                </div>
                                <div class="action-buttons">
                                    <button class="docs-main-btn" data-id="${sub.id}" data-name="${sub.name}" data-category="${sub.categoryCode}">📁 相關文件</button>
                                    <div class="qty-control">
                                        <button class="qty-dec" data-id="${sub.id}" data-cat="${sub.categoryCode}">−</button>
                                        <input type="number" class="qty-number-input" id="qty-input-${sub.id}" value="${currentQty}" min="0" step="1">
                                        <button class="qty-inc" data-id="${sub.id}" data-cat="${sub.categoryCode}">+</button>
                                    </div>
                                </div>
                            </div>`;
                });
                html += `</div></div>`;
            }
        }
        
        document.getElementById('productsList').innerHTML = html;
        attachProductEventsForGlobalSearch();
    }

    function attachProductEventsForGlobalSearch() {
        document.querySelectorAll('.docs-main-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');

            for(let cat of ['A','B','C','D','E','F','G','H']) {
                const catData = equipmentDB[cat];
                if(catData && catData.mainGroups) {
                    for(let group of catData.mainGroups) {
                        const found = group.subItems.find(s => s.id === id);
                        if(found) return { ...found, category: cat };
                    }
                }

            return null;

                if(newVal<0) newVal=0; 
                input.value = newVal; 
                setQuantity(sub.id, newVal, { id:sub.id, name:sub.name, category:cat, code:sub.id, desc:sub.desc }); 
            } 
        }));
        
        qtyDec.forEach(btn => btn.addEventListener('click',()=>{ 
            const id = btn.getAttribute('data-id'); 
            const cat = btn.getAttribute('data-cat');
            const sub = findSubGlobal(id);
            if(sub){ 
                const input = document.getElementById(`qty-input-${id}`); 
                let newVal = (parseInt(input.value,10)||0)-1; 
                if(newVal<0) newVal=0; 
                input.value = newVal; 
                setQuantity(sub.id, newVal, { id:sub.id, name:sub.name, category:cat, code:sub.id, desc:sub.desc }); 
            } 
        }));
        
        qtyInputs.forEach(input=>{

                this.value = raw;

                if(sub){ 
                    setQuantity(sub.id, raw, { id:sub.id, name:sub.name, category:sub.category, code:sub.id, desc:sub.desc });

    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    // 【請在此處保留您的 generateInquiryHtml 完整內容】
    function generateInquiryHtml(projectName) {
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
    
    // 分群組 by category
    const groups = new Map();
    for (let item of inquiryCart.values()) {
        let cat = item.category || '自訂';
        if (!groups.has(cat)) groups.set(cat, []);
        groups.get(cat).push(item);
    }
    
    let allTablesHtml = '';
    let globalSerialNo = 1;  // 全域序號
    
    for (let [cat, items] of groups.entries()) {
        let rows = '';
        for (let it of items) {
            rows += `<tr>
                        <td style="text-align:center">${globalSerialNo++}</td>
                        <td>${escapeHtml(it.code || it.id)}</td>
                        <td>${escapeHtml(it.name)}</td>
                        <td>${escapeHtml(it.desc || '')}</td>
                        <td style="text-align:center">${it.quantity}</td>
                       </tr>`;
        }
        allTablesHtml += `<div style="margin-bottom: 32px;">
            <h3 style="background:#1f4662; color:white; padding:8px 12px; border-radius:12px;">📁 類別 ${cat} · ${cat === 'I' ? '其他設備需求' : (equipmentDB[cat]?.name || '設備')}</h3>
            <table style="border-collapse:collapse; width:100%; margin-top:8px;">
                <thead>
                    <tr style="background:#eef2fa;">
                        <th style="width:50px">序號</th>
                        <th>設備代號</th>
                        <th>設備名稱</th>
                        <th>備註</th>
                        <th style="width:80px">數量</th>
                    </tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="5">無項目</td></tr>'}</tbody>
            </table>
        </div>`;
    }
    
    return `<!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>詢價單_${escapeHtml(projectName)}</title>

                border-left: 4px solid #ffb347;

                color: #666;

        </style>

    <body>
        <h2>📄 設備詢價單</h2>
        <div class="info-section">
            <p><strong>📌 案件名稱：</strong>${escapeHtml(projectName)}</p>
            <p><strong>📅 產生日期：</strong>${dateStr}</p>
            <p><strong>📊 總品項數：</strong>${Array.from(inquiryCart.values()).reduce((sum, item) => sum + item.quantity, 0)} 件</p>
        </div>
        ${allTablesHtml}
        <div class="footer-note">
            ※ 本文件為正式詢價依據，請確認規格及數量後回覆。
        </div>

    </html>`;
}

    let globalSerialNo = 1;  // 全域序號
    
    for (let [cat, items] of groups.entries()) {
        // 加入類別標題行（合併儲存格效果）
        const catName = cat === 'I' ? '其他設備需求' : (equipmentDB[cat]?.name || cat);
        exportData.push([`【${cat}類 - ${catName}】`, '', '', '', '', '']);
        
        for (let it of items) {
            exportData.push([
                globalSerialNo++,
                cat,
                it.code || it.id,
                it.name,
                it.desc || '',
                it.quantity
            ]);
        }
        
        // 類別之間加入空行
        exportData.push(['', '', '', '', '', '']);
    }
    
    // 加入案件資訊（在資料上方）
    const totalQty = Array.from(inquiryCart.values()).reduce((sum, item) => sum + item.quantity, 0);
    exportData.unshift(['總詢價數量', totalQty, '', '', '', '']);
    exportData.unshift(['產生日期', new Date().toLocaleString('zh-TW'), '', '', '', '']);
    exportData.unshift(['案件名稱', pjName, '', '', '', '']);
    exportData.unshift(['設備詢價單', '', '', '', '', '']);
    exportData.unshift(['', '', '', '', '', '']); // 空行分隔
    
    // 建立工作表
    const ws = XLSX.utils.aoa_to_sheet(exportData);
    
    // 設定欄寬
    ws['!cols'] = [
        { wch: 8 },   // 序號
        { wch: 12 },  // 設備類別
        { wch: 18 },  // 設備代號
        { wch: 32 },  // 設備名稱
        { wch: 40 },  // 規格/備註
        { wch: 8 }    // 數量
    ];
    
    // 建立工作簿並匯出
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '詢價單');
    
    // 產生檔案名稱並下載
    const fileName = generateFileName(pjName, 'xlsx');
    XLSX.writeFile(wb, fileName);
    
    showToast('匯出 Excel 完成', 1000);
}
    
    function previewAndAlert() { let pjName=document.getElementById('projectNameInput').value.trim(); if(!pjName){ showToast('請填寫案件名稱',1000); return; } if(inquiryCart.size===0){ showToast('詢價車為空',1000); return; } const html=generateInquiryHtml(pjName); const win=window.open(); win.document.write(html); win.document.close(); }
	
	    // 寄送Email功能 (指定信箱)
    function sendEmailWithInquiry() {
        let projectName = document.getElementById('projectNameInput').value.trim();
        if(!projectName) {
            showToast('請先填寫案件名稱', 1500);
            return;
        }
        if(inquiryCart.size === 0) {
            showToast('詢價車為空，無資料可寄送', 1500);
            return;
        }
        const inquiryHtml = generateInquiryHtml(projectName);
        // 將HTML內容轉為純文字並保留結構作為郵件正文
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = inquiryHtml;
        const plainText = tempDiv.innerText; // 取得純文字版
        
        const mailtoLink = `mailto:htbo@hochiki.com.tw?cc=winston@hochiki.com.tw&subject=${encodeURIComponent(`設備詢價單 - ${projectName}`)}&body=${encodeURIComponent(plainText)}`;
        window.location.href = mailtoLink;
        showToast('已開啟郵件客戶端，請發送', 1500);
    }
	
	
    function setupDrawerEvents() { const drawer = document.getElementById('cartDrawer'); const overlay = document.getElementById('drawerOverlay'); document.getElementById('openCartDrawerBtn').addEventListener('click', () => { drawer.classList.add('open'); overlay.classList.add('show'); renderDrawerCart(); }); document.getElementById('closeDrawerBtn').addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('show'); }); overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('show'); }); document.getElementById('exportHtmlBtn').addEventListener('click', exportHtml); document.getElementById('exportJsonBtn').addEventListener('click', exportExcel); 
	document.getElementById('drawerCheckoutBtn').addEventListener('click', previewAndAlert); document.getElementById('emailInquiryBtn').addEventListener('click', sendEmailWithInquiry); }
    
    function init(){ 
        buildSidebarNav(); 
        renderProductsByCategory('A'); 
        updateHeaderByCategory('A'); 
        updateAllUI(); 
        setupDrawerEvents(); 
        document.getElementById('searchBtn').addEventListener('click', performSearch); 
        document.getElementById('clearSearchBtn').addEventListener('click', clearSearch); 
        document.getElementById('searchKeyword').addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); }); 
    }
    init();
</script>
